<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — BeatWave PC</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060a;
      color: #fff;
      font-family: 'Clash Display', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .code {
      font-size: clamp(80px, 18vw, 180px);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(to left, #6366f1, #a855f7, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    h1 {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      margin-top: 12px;
      letter-spacing: 0.04em;
    }
    p {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      margin-top: 8px;
    }
    a {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
    }
    a:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); color: #fff; }
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      animation: float linear infinite;
    }
    @keyframes float {
      from { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots" id="dots"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;">
    <img src="/image.png" alt="BeatWave" style="height:40px;margin-bottom:24px;opacity:0.6;" />
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This beat doesn't exist in our library.</p>
    <a href="/">← Back to BeatWave PC</a>
  </div>
  <script>
    const c = document.getElementById('dots');
    for (let i = 0; i < 18; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const s = Math.random() * 40 + 8;
      d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;`;
      c.appendChild(d);
    }
  </script>
</body>
</html>
